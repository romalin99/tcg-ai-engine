# Oracle 规则源示例配置：
#   1. 执行 scripts/sql/rules_table.sql 建表
#   2. go run ./cmd/ruleloader -dsn 'oracle://scott:tiger@localhost:1521/FREEPDB1' 导入 rules/*.grl
#   3. go run ./cmd/api -f configs/config.oracle.toml
# 之后直接 UPDATE 表里的 GRL_CONTENT，服务会在下个轮询周期自动热加载。

[server]
addr = ":8080"
shutdown_seconds = 10

[log]
level = "info"
grl_trace = false

[rules]
source = "oracle"
reload_interval_seconds = 30 # 数据库源建议放宽轮询间隔

[rules.oracle]
dsn = "oracle://scott:tiger@localhost:1521/FREEPDB1"
table = "RISK_RULES"
