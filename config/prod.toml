name = "tcg-ai-engine"
env = "prod"
host = "0.0.0.0"
port = 18_080
timeout = 30
bodyLimit = 52_428_800
shutdownTimeout = 10

[consul]
hosts = [ "127.0.0.1:2379" ]
key = "TCG-AI-ENGINE-RPC-SERVICE"

[timeouts]
quick = 10
normal = 30
long = 60
upload = 120
[oracle]
user = ""
passwd = ""
addr_connect_stringer = ""
max_open_conn = 100
max_idle_conn = 100
max_life_time = 30
max_idle_time = 30
appendedOptions = "stmtCacheSize=64 enableStmtCache=true fetchArraySize=110 prefetch_count=100 SSL=off poolMinSessions=50 poolMaxSessions=50 poolIncrement=0 enableClientResultCache=true"
enable_stats_monitor = true
stats_interval = 60
read_timeout = 15
write_timeout = 15 # 写入超时

[redis]
addr = [ "TCG-UCS-REDIS:6379"]
master_name = "mymaster"
password = ""
db = 0
dbs = [
  { db = 2, poolSize = 50, setDefaultExpiration = 86400 }
]

[bigCache]
entryExpireSeconds = 1_800

[kafka.producer]
brokers                 = ["TCG-KAFKA01:9092", "TCG-KAFKA02:9092", "TCG-KAFKA03:9092"]  # KAFKA_BROKERS
client_id               = "tcg-ai-engine-producer-cid"
default_topics          = ["ai-engine-events"]
required_acks           = -1
enable_idempotence      = true
max_in_flight           = 5
record_retries          = 5
hard_delivery_bound     = true
delivery_timeout_ms     = 30000
flush_timeout_ms        = 35000
request_timeout_ms      = 30000
compression             = "snappy"
linger_ms               = 10
batch_max_bytes         = 1048576
max_buffered_records    = 200000
max_buffered_bytes      = 67108864
retry_queue_cap         = 10000
metrics_log_interval_ms = 60000
[kafka.producer.tls]
enable               = false
ca_file              = ""
cert_file            = ""
key_file             = ""
insecure_skip_verify = false

[kafka.producer.sasl]
enable    = false
mechanism = ""
user      = ""
pass      = ""
pass_file = ""

[kafka.producer.topics."tcg-ai-engine"]
acks              = "all"
retries           = 3
retry_backoff_ms  = 100
compression       = "lz4"
batch_size        = 16384
linger_ms         = 5
max_message_bytes = 1048576

[kafka.consumer]
brokers               = ["TCG-KAFKA01:9092", "TCG-KAFKA02:9092", "TCG-KAFKA03:9092"]
client_id             = "tcg-ai-engine-consumer-cid"
default_topics        = ["ai-engine-events"]
group_id              = "ai-engine-consumer-group-id"
auto_offset_reset     = "latest"
max_poll_records      = 500
fetch_max_bytes       = 10485760
fetch_max_partition_bytes = 10485760
fetch_min_bytes       = 1
fetch_max_wait_ms     = 300
session_timeout_ms    = 15000
heartbeat_interval_ms = 3000
commit_timeout_ms     = 10000
rebalance_timeout_ms  = 60000
shutdown_timeout_ms   = 30000
revoke_flush_timeout_ms = 8000
max_workers           = 4
[log]
mode = "file"
level = "info"
name = "tcg-ai-engine"
serviceName = "TCG-AI-ENGINE"
encoding = "json"
path = "/var/log/tcg-ai-engine"
maxSize = 500
maxBackups = 10
keepDays = 5
rotation = "size"
bufferSize = 20
bufferFlushInterval = 200
[log.fileInfo]
path = "/var/log/tcg-ai-engine"
pathBehavior = "/var/log/tcg-ai-engine/behavior"

[pprof]
enabled = true
port = 6_060
host = "0.0.0.0"


[telemetry]
enabled = true
server_name = "TCG-AI-ENGINE"
endpoint = "localhost:4318"
sampler = 1
batcher = "jaeger"
skip_paths = [ "/health", "/livez", "/readyz", "/metrics", "/ping", "/monitor" ]
[rules]
source = "file"             # file / oracle（oracle 源需配置 [rules.oracle] 的 dsn）
reload_interval_seconds = 5 # 热更新轮询间隔秒数，<=0 关闭自动热更新

[rules.file]
dir = "rules"
